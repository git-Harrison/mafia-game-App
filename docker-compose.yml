services:
  db:
    image: postgres:17-alpine
    container_name: mafia-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mafia}
      POSTGRES_USER: ${POSTGRES_USER:-mafia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mafia_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mafia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mafia} -d ${POSTGRES_DB:-mafia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    # 옵션 서비스 — `docker compose --profile docker up` 일 때만 시작.
    # 평소 개발은 호스트에서 `cd server && pnpm start:dev` 권장 (RAM 1~2GB 절약 + 빠른 hot reload).
    profiles: ["docker"]
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: mafia-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      CI: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-mafia}:${POSTGRES_PASSWORD:-mafia_dev}@db:5432/${POSTGRES_DB:-mafia}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      GAME_DAY_DISCUSSION_SEC: ${GAME_DAY_DISCUSSION_SEC:-120}
      GAME_VOTE_SELECT_SEC: ${GAME_VOTE_SELECT_SEC:-30}
      GAME_VOTE_CONFIRM_SEC: ${GAME_VOTE_CONFIRM_SEC:-20}
      GAME_NIGHT_DOCTOR_SEC: ${GAME_NIGHT_DOCTOR_SEC:-30}
      GAME_NIGHT_MAFIA_SEC: ${GAME_NIGHT_MAFIA_SEC:-30}
      GAME_NIGHT_POLICE_SEC: ${GAME_NIGHT_POLICE_SEC:-30}
      GAME_NIGHT_RESULT_SEC: ${GAME_NIGHT_RESULT_SEC:-5}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  mafia_pgdata:
